[package]
name = "oww-rs"
version = "0.3.1"
edition = "2024"
license = "MIT"
description = "Minimalistic version of the OpenWakeWord inference in Rust and ONNX runtime"
keywords = ["stopword", "speech", "alexa", "detection", "onnx"]

[lib]
crate-type = ["lib"]

[features]
# `mic` pulls in live-microphone capture (cpal) + async task driver (tokio) +
# resampling (rubato). Disabled via --no-default-features for embedders that
# only need the OwwModel detection path (tract-onnx). The DM-Voice spike builds
# the lib without `mic` to avoid linking a second cpal/rubato major version.
default = ["mic"]
mic = ["dep:cpal", "dep:tokio", "dep:tokio-util", "dep:rubato"]

[dependencies]
env_logger = "0.11"
log = "0.4"
hound = "3.5"
circular-buffer = "1.2"
chrono = "0.4"
rust-embed = "8.5"
tract-core = "0.22"
tract-onnx = "0.22"
approx = "0.5"
tokio = { version = "1", optional = true }
tokio-util = { version = "0", optional = true }
cpal = { version = "0.17", optional = true }
rubato = { version = "2.0.0", features = ["fft_resampler"], optional = true }

[dev-dependencies]
anyhow = "1"
