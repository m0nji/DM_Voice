name: Release

# Builds DM Voice for macOS Apple Silicon (DMG) and Windows x86_64 (NSIS .exe).
# Triggered by pushing a tag of the form `v*` (e.g. `v0.3.0`) or manually
# from the Actions tab.
#
# Intel-mac is not built (queue times on `macos-13` are long, demand is small).
# Windows ARM64 is not built yet — see commented matrix entry below; needs
# verified Vulkan SDK availability for aarch64-pc-windows-msvc.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14        # Apple Silicon (M1+)
            target: aarch64-apple-darwin
            arch: arm64
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build & bundle (Tauri)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No code signing in CI: the local self-signed cert lives only on
          # your machine. The DMG is unsigned; users will need to right-click
          # → Open the first time, or run `xattr -dr com.apple.quarantine`.
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "DM Voice ${{ github.ref_name }}"
          releaseBody: |
            Automatischer Release-Build.

            **macOS (Apple Silicon)**: DMG öffnen, App nach `~/Applications`
            ziehen. Beim ersten Start: Rechtsklick → "Öffnen" (App ist nicht
            von Apple notarisiert), dann Mikrofon- und Bedienungshilfen-
            Permissions erteilen.

            **Windows (x86_64, GPU-beschleunigt via Vulkan)**: NSIS-Installer
            ausführen. Beim ersten Start zeigt Windows SmartScreen
            möglicherweise eine Warnung — "Weitere Informationen → Trotzdem
            ausführen". GPU-Beschleunigung funktioniert auf NVIDIA, AMD und
            Intel Arc/Xe out-of-the-box (Vulkan-Treiber sind im GPU-Treiber
            enthalten).
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}
          projectPath: src-tauri

  build-windows:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest    # x86_64
            target: x86_64-pc-windows-msvc
            arch: x64
          # ARM64 vorerst auskommentiert — Vulkan-SDK auf aarch64-windows
          # noch nicht in allen LunarG-Versionen vollständig. Aktivieren
          # sobald getestet.
          # - runner: windows-11-arm
          #   target: aarch64-pc-windows-msvc
          #   arch: arm64
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Vulkan SDK
        # whisper-rs `vulkan` feature braucht Vulkan-Header + libs zur
        # Build-Zeit. LunarG-SDK liefert beides; cache spart ~3 min pro Run.
        uses: humbletim/install-vulkan-sdk@v1.2
        with:
          version: 1.3.290.0
          cache: true

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build & bundle (Tauri)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Kein Code-Signing in CI (kein EV-Cert vorhanden). User sehen
          # SmartScreen-Warnung beim ersten Start.
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "DM Voice ${{ github.ref_name }}"
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }} --bundles nsis
          projectPath: src-tauri
