name: Release

# Builds DM Voice for macOS Apple Silicon (DMG) and Windows x86_64 (NSIS .exe).
# Triggered by pushing a tag of the form `v*` (e.g. `v0.3.0`) or manually
# from the Actions tab.
#
# Intel-mac is not built (queue times on `macos-13` are long, demand is small).
# Windows ARM64 is not built yet — see commented matrix entry below; needs
# verified Vulkan SDK availability for aarch64-pc-windows-msvc.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14        # Apple Silicon (M1+)
            target: aarch64-apple-darwin
            arch: arm64
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Full history + tags so the changelog step can diff against
          # the previous tag.
          fetch-depth: 0

      - name: Generate release notes
        id: notes
        # Auto-generate the release body from git log between the
        # previous tag and the current one. Both build jobs run the same
        # script so they produce identical bodies — tauri-action would
        # otherwise race-overwrite each other's release text.
        shell: bash
        run: |
          body="$(.github/scripts/release-notes.sh "${GITHUB_REF_NAME}")"
          {
            echo 'body<<RELEASE_NOTES_EOF'
            echo "$body"
            echo 'RELEASE_NOTES_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: src-tauri

      - name: Decode Apple notarization API key
        # tauri-bundler erwartet den .p8-Key als Datei via APPLE_API_KEY_PATH,
        # nicht als base64-Inhalt. Unser GitHub-Secret APPLE_API_KEY hält den
        # base64-codierten .p8 — wir schreiben ihn hier in eine Datei und
        # exportieren den Pfad als Env-Var für den nächsten Step.
        env:
          APPLE_API_KEY_B64: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          mkdir -p ~/private_keys
          echo "$APPLE_API_KEY_B64" | base64 -d > ~/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8
          echo "APPLE_API_KEY_PATH=$HOME/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8" >> "$GITHUB_ENV"

      - name: Build & bundle (Tauri)
        # Hard cap: tauri-bundler ruft `xcrun notarytool submit --wait` ohne
        # eigenen Timeout auf. Wenn Apple's Notarization-Service Backlog hat,
        # blockt der Step bis zum Job-Default von 6h. 30 min ist genug für
        # einen normalen Notarization-Lauf (1–10 min) plus Puffer; danach
        # failed der Build schnell statt CI-Minuten zu verbrennen.
        timeout-minutes: 30
        uses: tauri-apps/tauri-action@fce9c6108b31ea247710505d3aaaa893ee6768d4 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tauri-Updater-Signatur: der Private Key signiert die
          # Update-Artefakte (.app.tar.gz.sig). Public Key liegt in
          # tauri.conf.json; ohne diese Env-Vars schlägt der Build fehl,
          # weil bundle.createUpdaterArtifacts: true gesetzt ist.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Apple Developer ID Codesign + Notarization. tauri-action
          # importiert das p12-Cert in einen temporären Keychain, signiert
          # mit Hardened Runtime und schickt die fertige .app via API-Key
          # zur Notarization an Apple. Ergebnis: Gatekeeper akzeptiert
          # die App ohne "Rechtsklick → Öffnen", und TCC-Permissions
          # (Mic/AX) überleben Updates, weil tccd auf cert-basierte
          # Designated Requirements matched statt auf CDHash.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # Achtung: tauri-bundler nennt die Key-ID "APPLE_API_KEY".
          # Unser gleichnamiges GitHub-Secret enthält dagegen den base64-
          # codierten .p8 — daher muss hier die Key-ID rein, nicht der
          # Schlüsselinhalt. Der Schlüsselinhalt landet via APPLE_API_KEY_PATH
          # (im vorigen Step gesetzt) als Datei beim Bundler.
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "DM Voice ${{ github.ref_name }}"
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}
          projectPath: src-tauri

  build-windows:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest    # x86_64
            target: x86_64-pc-windows-msvc
            arch: x64
          # ARM64 vorerst auskommentiert — Vulkan-SDK auf aarch64-windows
          # noch nicht in allen LunarG-Versionen vollständig. Aktivieren
          # sobald getestet.
          # - runner: windows-11-arm
          #   target: aarch64-pc-windows-msvc
          #   arch: arm64
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Full history + tags so the changelog step can diff against
          # the previous tag.
          fetch-depth: 0

      - name: Generate release notes
        id: notes
        # Same body as build-macos so tauri-action doesn't race the two
        # jobs' release-body writes against each other.
        shell: bash
        run: |
          body="$(.github/scripts/release-notes.sh "${GITHUB_REF_NAME}")"
          {
            echo 'body<<RELEASE_NOTES_EOF'
            echo "$body"
            echo 'RELEASE_NOTES_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup MSVC environment
        # vcvarsall env (CL, INCLUDE, LIB, PATH) für alle nachfolgenden
        # Steps. Ninja-Build erkennt MSVC dann via cl.exe im PATH.
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1
        with:
          arch: ${{ matrix.arch }}

      - name: Install Ninja
        # whisper.cpp's Vulkan-Backend baut intern `vulkan-shaders-gen`
        # als CMake ExternalProject. Mit dem Visual-Studio-Generator
        # entstehen geschachtelte MSBuild-CustomBuild→cmake-Aufrufe, in
        # denen die vcvarsall-Env vom inneren Sub-Process nicht erreicht
        # wird (Compiler-Detection scheitert). Ninja baut flach: ein
        # einziger cmake-Run, ein Ninja-Process, vcvars-Env wird sauber
        # durchgereicht.
        run: choco install ninja --version=1.13.2 -y --no-progress

      - name: Disable ccache (unreliable with MSVC for whisper.cpp)
        # windows-latest hat ccache vorinstalliert; CMake (whisper.cpp's
        # GGML_CCACHE=ON Default) findet es via find_program und nutzt es
        # als Compiler-Launcher. Bekanntes Problem: ccache + MSVC kann
        # bei .obj-Erstellung silent failen — exit 0, aber File fehlt,
        # was später als LNK1181 "cannot open input file" beim Linker
        # auftaucht. Binary umbenennen, sodass find_program nichts findet.
        shell: powershell
        run: |
          $ccache = Get-Command ccache -ErrorAction SilentlyContinue
          if ($ccache) {
            Rename-Item -Path $ccache.Source -NewName "$($ccache.Source).disabled" -Force
            Write-Host "ccache disabled at $($ccache.Source)"
          } else {
            Write-Host "ccache not on PATH, nothing to do"
          }

      - name: Enable Windows Long-Path support
        # whisper.cpp's nested vulkan-shaders-gen build erzeugt Pfade
        # >260 Zeichen (CMakeFiles\CMakeScratch\TryCompile-XXX\CMakeFiles\
        # cmTC_XXX.dir\vc140.pdb). Ohne LongPathsEnabled kann cl.exe die
        # PDB nicht öffnen ("C1041: cannot open program database").
        shell: powershell
        run: |
          Set-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" -Name "LongPathsEnabled" -Value 1 -Type DWord

      - name: Install Vulkan SDK
        # whisper-rs `vulkan` feature braucht Vulkan-Header + libs zur
        # Build-Zeit. LunarG-SDK liefert beides; cache spart ~3 min pro Run.
        uses: humbletim/install-vulkan-sdk@30ba978f977e81b72d091fc8888feb1fb26f9aff # v1.2
        with:
          version: 1.3.290.0
          cache: true

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: src-tauri

      - name: Build & bundle (Tauri)
        uses: tauri-apps/tauri-action@fce9c6108b31ea247710505d3aaaa893ee6768d4 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Ninja statt Visual Studio Generator: vermeidet die
          # geschachtelten MSBuild-CustomBuild-Steps, die das nested
          # ExternalProject (vulkan-shaders-gen) bei whisper.cpp's
          # Vulkan-Backend zum Crashen brachten. cmake-rs liest
          # CMAKE_GENERATOR aus dem Env, sodass sowohl outer (whisper-rs-sys)
          # als auch inner (vulkan-shaders-gen) cmake-Aufrufe Ninja nutzen.
          CMAKE_GENERATOR: "Ninja"
          CC: "cl"
          CXX: "cl"
          # Kürzeres Target-Dir (D:\t statt
          # D:\a\DM_Voice\DM_Voice\src-tauri\target) spart 57 Zeichen
          # am whisper.cpp-Build-Pfad. Sonst sprengt das nested
          # vulkan-shaders-gen-Build mit seinen TryCompile-Scratch-
          # Verzeichnissen den Windows-MAX_PATH (260 Zeichen) — selbst
          # mit LongPathsEnabled, weil cl.exe und CMake's nested Build
          # das Long-Path-Manifest nicht durchgehend respektieren.
          CARGO_TARGET_DIR: "D:\\t"
          # /Z7 + /FS als zusätzliche Absicherung gegen PDB-Probleme.
          CL: "/Z7 /FS"
          # Tauri-Updater-Signatur — siehe build-macos für Details.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Kein OS-Code-Signing in CI (kein EV-Cert vorhanden). User sehen
          # SmartScreen-Warnung beim ersten Start.
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "DM Voice ${{ github.ref_name }}"
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }} --bundles nsis updater
          projectPath: src-tauri

  # Final job: nach beiden Builds aus den .sig-Dateien das latest.json
  # generieren und an den Release hängen. Tauri-Updater im Client zieht
  # genau diese Datei vom releases/latest/download/-Endpoint.
  publish-updater-manifest:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Generate and upload latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          mkdir -p sigs
          # Alle .sig-Dateien des Releases herunterladen
          gh release download "$TAG" --repo "$REPO" --pattern '*.sig' --dir sigs
          ls -la sigs

          # Asset-Namen vom Release lesen (für die Download-URLs)
          assets_json=$(gh release view "$TAG" --repo "$REPO" --json assets)
          mac_asset=$(echo "$assets_json" | jq -er '[.assets[].name | select(test("aarch64\\.app\\.tar\\.gz$"))] | if length == 1 then .[0] else error("expected exactly one macOS updater asset, got \(length)") end')
          win_asset=$(echo "$assets_json" | jq -er '[.assets[].name | select(test("x64-setup\\.exe$"))] | if length == 1 then .[0] else error("expected exactly one Windows installer asset, got \(length)") end')

          mac_sig_file="sigs/${mac_asset}.sig"
          win_sig_file="sigs/${win_asset}.sig"
          test -s "$mac_sig_file" || { echo "Missing macOS updater signature: $mac_sig_file" >&2; exit 1; }
          test -s "$win_sig_file" || { echo "Missing Windows updater signature: $win_sig_file" >&2; exit 1; }
          mac_sig=$(cat "$mac_sig_file")
          win_sig=$(cat "$win_sig_file")

          version="${TAG#v}"
          base_url="https://github.com/${REPO}/releases/download/${TAG}"
          notes=$(gh release view "$TAG" --repo "$REPO" --json body -q .body)
          pub_date=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          jq -n \
            --arg version "$version" \
            --arg notes "$notes" \
            --arg pub_date "$pub_date" \
            --arg mac_url "${base_url}/${mac_asset}" \
            --arg mac_sig "$mac_sig" \
            --arg win_url "${base_url}/${win_asset}" \
            --arg win_sig "$win_sig" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: (
                {
                  "darwin-aarch64": {signature: $mac_sig, url: $mac_url},
                  "windows-x86_64": {signature: $win_sig, url: $win_url}
                }
              )
            }' > latest.json

          cat latest.json
          gh release upload "$TAG" latest.json --repo "$REPO" --clobber
