name: Release

# Builds DM Voice for macOS (Apple Silicon + Intel) and attaches the DMGs
# to a GitHub Release. Triggered by pushing a tag of the form `v*` (e.g.
# `v0.2.0`) or manually from the Actions tab.
#
# Windows support is intentionally not built here yet: the macOS-specific
# permission, key-injection and accessibility code in src-tauri/src would
# need a Windows port (CGEvent → SendInput, AVFoundation → MMDevice, etc.)
# before a Windows artifact would be useful.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14        # Apple Silicon
            target: aarch64-apple-darwin
            arch: arm64
          - runner: macos-13        # Intel
            target: x86_64-apple-darwin
            arch: x86_64
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build & bundle (Tauri)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No code signing in CI: the local self-signed cert lives only on
          # your machine. The DMG is unsigned; users will need to right-click
          # → Open the first time, or run `xattr -dr com.apple.quarantine`.
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "DM Voice ${{ github.ref_name }}"
          releaseBody: |
            Automatischer Release-Build.

            **macOS-Installation**: DMG öffnen, App nach `~/Applications` ziehen.
            Beim ersten Start: Rechtsklick → "Öffnen" (App ist nicht von Apple
            notarisiert), dann Mikrofon- und Bedienungshilfen-Permissions
            erteilen.
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
          projectPath: src-tauri
