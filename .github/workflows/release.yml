name: Release

# Builds DM Voice for macOS Apple Silicon and attaches the DMG to a
# GitHub Release. Triggered by pushing a tag of the form `v*` (e.g.
# `v0.2.0`) or manually from the Actions tab.
#
# Intel and Windows are intentionally not built: Intel-mac demand is
# minimal in 2026 and queue times for `macos-13` runners are long;
# Windows would need a port of the macOS-only code paths in
# src-tauri/src (CGEvent → SendInput, AVFoundation → MMDevice, AX → UIA).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14        # Apple Silicon (M1+)
            target: aarch64-apple-darwin
            arch: arm64
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build & bundle (Tauri)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No code signing in CI: the local self-signed cert lives only on
          # your machine. The DMG is unsigned; users will need to right-click
          # → Open the first time, or run `xattr -dr com.apple.quarantine`.
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "DM Voice ${{ github.ref_name }}"
          releaseBody: |
            Automatischer Release-Build.

            **macOS-Installation**: DMG öffnen, App nach `~/Applications` ziehen.
            Beim ersten Start: Rechtsklick → "Öffnen" (App ist nicht von Apple
            notarisiert), dann Mikrofon- und Bedienungshilfen-Permissions
            erteilen.
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
          projectPath: src-tauri
