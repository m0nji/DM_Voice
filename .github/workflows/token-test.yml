name: Token Test

# Throwaway diagnostic: can the Actions GITHUB_TOKEN create a release for the
# EXISTING v0.5.4 tag? Creates it as a prerelease (so it never becomes the
# "Latest" served to the updater). Delete this workflow after use.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Try to create the v0.5.4 release (prerelease) for the existing tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          if gh release create v0.5.4 --repo "$REPO" --prerelease \
               --title "DM Voice v0.5.4" --notes "staging — assets uploading"; then
            echo "CREATE_OK — token can create v0.5.4"
          else
            echo "CREATE_FAILED — token cannot create v0.5.4 release"
            exit 1
          fi
