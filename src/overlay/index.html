<!DOCTYPE html>
<html lang="de" style="background:transparent;background-color:rgba(0,0,0,0)">
<head>
<meta charset="UTF-8">
<meta name="color-scheme" content="dark">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root { background: transparent; color-scheme: dark; }
  html {
    background: transparent !important;
    background-color: rgba(0,0,0,0) !important;
  }
  body {
    width: 120px; height: 40px;
    background: transparent !important;
    background-color: rgba(0,0,0,0) !important;
    overflow: hidden;
    -webkit-app-region: no-drag;
    margin: 0; padding: 0;
  }
  #pill {
    width: 120px; height: 40px;
    background: #000;
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    opacity: 0;
    transition: opacity 150ms ease;
  }
  #pill.visible { opacity: 1; }
  .bar {
    width: 3px;
    height: 8px;
    background: #fff;
    border-radius: 2px;
    transition: height 80ms ease, background 200ms ease;
  }
  #pill.done .bar { background: #22c55e; }
</style>
</head>
<body style="background:transparent;background-color:rgba(0,0,0,0)">
<div id="pill">
  <div class="bar"></div>
  <div class="bar"></div>
  <div class="bar"></div>
  <div class="bar"></div>
  <div class="bar"></div>
</div>
<script src="waveform.js"></script>
</body>
</html>
