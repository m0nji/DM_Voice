<!DOCTYPE html>
<html lang="en" style="background:transparent;background-color:rgba(0,0,0,0)">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 220px;
    height: 52px;
    background: transparent !important;
    background-color: rgba(0, 0, 0, 0) !important;
    overflow: hidden;
    -webkit-app-region: no-drag;
  }
  #pill {
    position: absolute;
    left: 10px;
    top: 6px;
    width: 200px;
    height: 40px;
    background: rgba(18, 18, 20, 0.93);
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    padding: 0 16px;
    opacity: 0;
    transform: scale(0.82) translateY(4px);
    transition: opacity 140ms ease, transform 140ms ease;
    will-change: opacity, transform;
    -webkit-font-smoothing: antialiased;
  }
  #pill.visible {
    opacity: 1;
    transform: scale(1) translateY(0);
  }
  #dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #ef4444;
    flex-shrink: 0;
    transition: background 200ms ease;
  }
  #pill.processing #dot {
    background: #a78bfa;
    animation: blink 1.1s ease-in-out infinite;
  }
  #pill.done #dot {
    background: #22c55e;
    animation: none;
  }
  #pill.no-speech #dot {
    background: #9ca3af;
    animation: none;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  #bars {
    display: flex;
    gap: 2px;
    align-items: center;
    height: 22px;
    flex-shrink: 0;
  }
  .bar {
    width: 3px;
    height: 6px;
    background: #ef4444;
    border-radius: 2px;
    transition: height 70ms ease, background 200ms ease;
  }
  #pill.processing .bar { background: #a78bfa; }
  #pill.done .bar { background: #22c55e; }
  #pill.no-speech .bar { background: #9ca3af; }
  #label {
    font-family: -apple-system, "SF Pro Text", system-ui, sans-serif;
    font-size: 12.5px;
    font-weight: 500;
    letter-spacing: 0.01em;
    color: rgba(255, 255, 255, 0.82);
    white-space: nowrap;
    flex-shrink: 0;
    transition: color 200ms ease;
  }
  #pill.done #label { color: #22c55e; }
  #pill.no-speech #label { color: #9ca3af; }
</style>
</head>
<body style="background:transparent;background-color:rgba(0,0,0,0)">
<div id="pill">
  <div id="dot"></div>
  <div id="bars">
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
  </div>
  <span id="label">Recording</span>
</div>
<script src="../i18n/i18n.js"></script>
<script src="waveform.js"></script>
</body>
</html>
