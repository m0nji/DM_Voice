<!DOCTYPE html>
<html lang="en" style="background:transparent;background-color:rgba(0,0,0,0)">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../shared/dm-tokens.css">
<style>
  /* DM Apps "Graphite Sand": Flächen/Ränder/Processing folgen den Brand-Tokens,
     Recording-Rot und Done-Grün bleiben semantische Statusfarben. */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 220px;
    height: 52px;
    background: transparent !important;
    background-color: rgba(0, 0, 0, 0) !important;
    overflow: hidden;
    -webkit-app-region: no-drag;
  }
  #pill {
    position: absolute;
    left: 50%;
    top: 6px;
    /* Auto width so idle "Ready" is compact and recording (with bars) is wider.
       Centered within the fixed-width transparent window via translateX(-50%). */
    width: auto;
    max-width: 200px;
    height: 40px;
    background: rgba(24, 22, 20, 0.93); /* --dm-surface mit Transparenz */
    border-radius: 20px; /* --dm-radius-md */
    /* Warm sand edge + soft glow so the pill stands out against dark backgrounds. */
    border: 1px solid rgba(231, 215, 191, 0.32);
    box-shadow: 0 0 0 0.5px rgba(231, 215, 191, 0.12), 0 2px 9px rgba(0, 0, 0, 0.45);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    padding: 0 16px;
    opacity: 0;
    transform: translateX(-50%) scale(0.82) translateY(4px);
    transform-origin: center;
    transition: opacity 140ms ease, transform 140ms ease, background 200ms ease;
    will-change: opacity, transform;
    -webkit-font-smoothing: antialiased;
  }
  #pill.visible {
    opacity: 1;
    transform: translateX(-50%) scale(1) translateY(0);
  }
  /* In pinned (always-visible) mode the pill is draggable. Children must not
     swallow the mousedown, or the Tauri drag region won't engage. */
  #pill.pinned { cursor: grab; }
  #pill.pinned:active { cursor: grabbing; }
  #pill.pinned > * { pointer-events: none; }
  /* Dimmed idle "Ready" look shown while pinned and not recording. Flat gray
     bars stay visible; auto-width keeps the pill compact (no dead side space). */
  #pill.ready { background: rgba(24, 22, 20, 0.82); }
  #pill.ready #dot { background: var(--dm-muted); animation: none; }
  #pill.ready .bar { background: var(--dm-muted); }
  #pill.ready #label { color: rgba(245, 241, 234, 0.55); }
  #dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #ef4444;
    flex-shrink: 0;
    transition: background 200ms ease;
  }
  #pill.processing #dot {
    background: var(--dm-primary);
    animation: blink 1.1s ease-in-out infinite;
  }
  #pill.done #dot {
    background: #22c55e;
    animation: none;
  }
  #pill.no-speech #dot {
    background: var(--dm-muted);
    animation: none;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  #bars {
    display: flex;
    gap: 2px;
    align-items: center;
    height: 28px;
    flex-shrink: 0;
  }
  .bar {
    width: 3px;
    height: 6px;
    background: #ef4444;
    border-radius: 2px;
    transition: height 70ms ease, background 200ms ease;
  }
  #pill.processing .bar { background: var(--dm-primary); }
  #pill.done .bar { background: #22c55e; }
  #pill.no-speech .bar { background: var(--dm-muted); }
  #label {
    font-family: var(--dm-font-sans);
    font-size: 12.5px;
    font-weight: 500;
    letter-spacing: 0.01em;
    color: rgba(245, 241, 234, 0.82);
    white-space: nowrap;
    flex-shrink: 0;
    transition: color 200ms ease;
  }
  #pill.done #label { color: #22c55e; }
  #pill.no-speech #label { color: var(--dm-muted); }
</style>
</head>
<body style="background:transparent;background-color:rgba(0,0,0,0)">
<div id="pill">
  <div id="dot"></div>
  <div id="bars">
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
  </div>
  <span id="label">Recording</span>
</div>
<script src="../i18n/i18n.js"></script>
<script src="waveform.js"></script>
</body>
</html>
