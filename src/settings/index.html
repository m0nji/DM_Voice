<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 13px;
    background: #1e1e1e;
    color: #e0e0e0;
    padding: 16px;
    width: 100%;
    overflow-x: hidden;
  }
  h1 { font-size: 15px; font-weight: 600; margin-bottom: 16px; color: #fff; }
  .field { margin-bottom: 14px; }
  label { display: block; font-size: 11px; color: #888; text-transform: uppercase;
          letter-spacing: 0.5px; margin-bottom: 4px; }
  .shortcut-box {
    background: #2c2c2e; border: 1px solid #3a3a3c; border-radius: 6px;
    padding: 6px 10px; cursor: pointer; user-select: none;
    color: #fff; font-size: 13px;
  }
  .shortcut-box.listening { border-color: #0a84ff; color: #0a84ff; }
  .model-row { display: flex; justify-content: space-between; align-items: center;
               padding: 6px 0; border-bottom: 1px solid #2c2c2e; }
  .model-name { font-weight: 500; }
  .model-meta { font-size: 11px; color: #888; }
  button {
    background: #0a84ff; border: none; border-radius: 5px; color: #fff;
    padding: 4px 10px; font-size: 12px; cursor: pointer;
  }
  button.danger { background: #ff453a; }
  button.subtle { background: #2c2c2e; color: #e0e0e0; }
  .progress { height: 4px; background: #3a3a3c; border-radius: 2px; margin-top: 4px; }
  .progress-bar { height: 100%; background: #0a84ff; border-radius: 2px;
                  width: 0%; transition: width 200ms; }
  .perm-row { display: flex; align-items: center; padding: 6px 0;
              border-bottom: 1px solid #2c2c2e; gap: 8px; }
  .perm-row:last-child { border-bottom: none; }
  .perm-name { flex: 1; font-weight: 500; }
  .perm-status {
    font-size: 11px; padding: 2px 7px; border-radius: 10px; font-weight: 500;
  }
  .perm-status.granted { background: rgba(48,209,88,0.18); color: #30d158; }
  .perm-status.denied { background: rgba(255,69,58,0.18); color: #ff453a; }
  .perm-status.not_determined { background: rgba(255,159,10,0.18); color: #ff9f0a; }
  .perm-status.restricted { background: rgba(255,159,10,0.18); color: #ff9f0a; }
  .perm-status.unknown { background: rgba(142,142,147,0.25); color: #aeaeb2; }
  .toggle-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 0;
  }
  .toggle-row .toggle-label { font-weight: 500; }
  .toggle-row input[type="checkbox"] {
    appearance: none; width: 32px; height: 18px; background: #3a3a3c;
    border-radius: 9px; position: relative; cursor: pointer; outline: none;
    transition: background 150ms;
  }
  .toggle-row input[type="checkbox"]::after {
    content: ""; position: absolute; top: 2px; left: 2px;
    width: 14px; height: 14px; background: #fff; border-radius: 50%;
    transition: left 150ms;
  }
  .toggle-row input[type="checkbox"]:checked { background: #0a84ff; }
  .toggle-row input[type="checkbox"]:checked::after { left: 16px; }

  /* Time Saved card */
  .timesaved-card {
    background: #2c2c2e; border-radius: 6px; padding: 12px 12px 10px;
  }
  .timesaved-main { text-align: center; margin-bottom: 10px; }
  .timesaved-minutes {
    font-size: 28px; font-weight: 700; color: #30d158;
    line-height: 1.1;
  }
  .timesaved-subtitle {
    font-size: 11px; color: #aeaeb2; margin-top: 2px;
  }
  .timesaved-controls {
    display: flex; align-items: center; justify-content: space-between;
    gap: 8px; padding: 6px 0; border-top: 1px solid #1e1e1e;
  }
  .timesaved-controls .typing-speed-label {
    font-size: 11px; color: #aeaeb2; font-weight: 500;
    text-transform: none; letter-spacing: 0; margin: 0;
  }
  .timesaved-controls select {
    background: #1e1e1e; color: #e0e0e0; border: 1px solid #3a3a3c;
    border-radius: 4px; padding: 3px 6px; font-size: 12px; cursor: pointer;
    outline: none;
  }
  .timesaved-basis {
    font-size: 10.5px; color: #8e8e93; margin-top: 6px; line-height: 1.35;
  }

  .update-row {
    background: #2c2c2e; border-radius: 6px; padding: 10px 12px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .update-line { display: flex; align-items: center; gap: 8px; }
  .update-version { flex: 1; font-weight: 500; }
  .update-meta { font-size: 11px; color: #888; }
  .update-status.available { color: #30d158; font-weight: 500; }
  .update-status.error { color: #ff453a; }
  .update-notes {
    font-size: 11px; color: #aeaeb2; max-height: 100px; overflow-y: auto;
    background: #1e1e1e; border-radius: 4px; padding: 6px 8px; white-space: pre-wrap;
  }
</style>
</head>
<body>
<h1 data-i18n="settings.title">DM Voice</h1>

<div class="field">
  <label data-i18n="settings.shortcut.label">Shortcut</label>
  <div class="shortcut-box" id="shortcut-box" data-i18n="settings.shortcut.placeholder">Click to change</div>
</div>

<div class="field">
  <label data-i18n="settings.sounds.label">Sounds</label>
  <div class="toggle-row">
    <span class="toggle-label" data-i18n="settings.sounds.toggle">Play sounds</span>
    <input type="checkbox" id="sounds-toggle">
  </div>
</div>

<div class="field">
  <label data-i18n="settings.timesaved.label">Time Saved</label>
  <div class="timesaved-card">
    <div class="timesaved-main">
      <div class="timesaved-minutes" id="timesaved-minutes">—</div>
      <div class="timesaved-subtitle" id="timesaved-subtitle"></div>
    </div>
    <div class="timesaved-controls">
      <span class="typing-speed-label" data-i18n="settings.timesaved.typingSpeed">Typing speed:</span>
      <select id="typing-speed-select">
        <option value="beginner" data-i18n="settings.timesaved.preset.beginner">Beginner (24 WPM)</option>
        <option value="average" data-i18n="settings.timesaved.preset.average">Average (40 WPM)</option>
        <option value="fast" data-i18n="settings.timesaved.preset.fast">Fast (60 WPM)</option>
      </select>
    </div>
    <div class="timesaved-basis" id="timesaved-basis"></div>
  </div>
</div>

<div class="field">
  <label data-i18n="settings.permissions.label">Permissions</label>
  <div id="perm-list">
    <div class="perm-row" id="perm-mic">
      <div class="perm-name" data-i18n="settings.permissions.microphone">Microphone</div>
      <span class="perm-status unknown">…</span>
      <button class="subtle" data-i18n="settings.permissions.action.open">Open</button>
    </div>
    <div class="perm-row" id="perm-ax">
      <div class="perm-name" data-i18n="settings.permissions.accessibility">Accessibility</div>
      <span class="perm-status unknown">…</span>
      <button class="subtle" data-i18n="settings.permissions.action.open">Open</button>
    </div>
  </div>
</div>

<div class="field">
  <label data-i18n="settings.models.label">Models</label>
  <div id="model-list"></div>
</div>

<div class="field">
  <label data-i18n="settings.updates.label">Updates</label>
  <div class="update-row">
    <div class="update-line">
      <div class="update-version" id="update-version">Version …</div>
      <button class="subtle" id="update-check-btn" data-i18n="settings.updates.check">Check for updates</button>
    </div>
    <div class="update-meta" id="update-status" data-i18n="settings.updates.notChecked">Not checked yet.</div>
    <div class="update-notes" id="update-notes" style="display:none"></div>
    <div class="update-line" id="update-install-line" style="display:none">
      <div class="update-meta" id="update-progress-text" style="flex:1" data-i18n="settings.updates.ready">Ready.</div>
      <button id="update-install-btn" data-i18n="settings.updates.installBtn">Install &amp; restart</button>
    </div>
    <div class="progress" id="update-progress" style="display:none">
      <div class="progress-bar" id="update-progress-bar"></div>
    </div>
  </div>
</div>

<script src="../i18n/i18n.js"></script>
<script src="settings.js"></script>
</body>
</html>
