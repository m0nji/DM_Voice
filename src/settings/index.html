<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 13px;
    background: #1e1e1e;
    color: #e0e0e0;
    padding: 16px 20px 20px;
    width: 100%;
    overflow-x: hidden;
  }
  h1 {
    font-size: 15px; font-weight: 600; margin-bottom: 16px; color: #fff;
  }
  .columns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 22px;
    align-items: start;
  }
  .field { margin-bottom: 16px; }
  .field:last-child { margin-bottom: 0; }
  label {
    display: block; font-size: 10.5px; color: #8e8e93;
    text-transform: uppercase; letter-spacing: 0.6px;
    margin-bottom: 6px; font-weight: 500;
  }
  .shortcut-box {
    background: #2c2c2e; border: 1px solid #3a3a3c; border-radius: 6px;
    padding: 6px 10px; cursor: pointer; user-select: none;
    color: #fff; font-size: 13px;
  }
  .shortcut-box.listening { border-color: #0a84ff; color: #0a84ff; }

  /* Model rows */
  .model-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 7px 0; border-bottom: 1px solid #2c2c2e; gap: 8px;
  }
  .model-row:last-child { border-bottom: none; }
  .model-name { font-weight: 500; }
  .model-meta { font-size: 11px; color: #8e8e93; }

  button {
    background: #2c2c2e; border: 1px solid #3a3a3c; border-radius: 5px;
    color: #e0e0e0; padding: 4px 10px; font-size: 12px; cursor: pointer;
    transition: background 120ms;
  }
  button:hover { background: #3a3a3c; }
  button.primary { background: #0a84ff; border-color: #0a84ff; color: #fff; }
  button.primary:hover { background: #0073e6; }
  button.danger { background: transparent; border-color: #ff453a; color: #ff453a; }
  button.danger:hover { background: rgba(255,69,58,0.12); }

  .progress { height: 4px; background: #3a3a3c; border-radius: 2px; margin-top: 4px; }
  .progress-bar {
    height: 100%; background: #0a84ff; border-radius: 2px;
    width: 0%; transition: width 200ms;
  }

  /* Permissions */
  .perm-row {
    display: flex; align-items: center; padding: 7px 0;
    border-bottom: 1px solid #2c2c2e; gap: 10px;
  }
  .perm-row:last-child { border-bottom: none; }
  .perm-name { flex: 1; font-weight: 500; }
  .perm-status { font-size: 11px; font-weight: 500; }
  .perm-status.granted        { color: #30d158; }
  .perm-status.denied         { color: #ff453a; }
  .perm-status.not_determined { color: #8e8e93; }
  .perm-status.restricted     { color: #8e8e93; }
  .perm-status.unknown        { color: #8e8e93; }

  /* Toggle */
  .toggle-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 4px 0;
  }
  .toggle-row .toggle-label { font-weight: 500; }
  .toggle-row input[type="checkbox"] {
    appearance: none; width: 32px; height: 18px; background: #3a3a3c;
    border-radius: 9px; position: relative; cursor: pointer; outline: none;
    transition: background 150ms;
  }
  .toggle-row input[type="checkbox"]::after {
    content: ""; position: absolute; top: 2px; left: 2px;
    width: 14px; height: 14px; background: #fff; border-radius: 50%;
    transition: left 150ms;
  }
  .toggle-row input[type="checkbox"]:checked { background: #0a84ff; }
  .toggle-row input[type="checkbox"]:checked::after { left: 16px; }

  /* Hands-free options — label left, control right (matches .toggle-row) */
  .hf-row {
    display: flex; align-items: center; justify-content: space-between;
    gap: 8px; padding: 4px 0;
  }
  .hf-label { font-weight: 500; }
  .hf-control {
    width: 132px; flex: none;
    background: #1e1e1e; color: #e0e0e0; border: 1px solid #3a3a3c;
    border-radius: 5px; padding: 4px 8px; font-size: 12px; cursor: pointer;
    outline: none;
  }
  .hf-control:focus { border-color: #0a84ff; }
  .hf-silence { display: flex; align-items: center; gap: 8px; width: 132px; flex: none; }
  .hf-silence input[type="range"] { flex: 1; min-width: 0; accent-color: #0a84ff; }
  .hf-silence-value {
    font-size: 11px; color: #aeaeb2; min-width: 30px; text-align: right;
    font-variant-numeric: tabular-nums;
  }

  /* Time Saved card */
  .timesaved-card {
    background: #2c2c2e; border-radius: 6px; padding: 14px 14px 10px;
  }
  .timesaved-main { text-align: center; margin-bottom: 10px; }
  .timesaved-minutes {
    font-size: 26px; font-weight: 700; color: #fff; line-height: 1.1;
  }
  .timesaved-subtitle {
    font-size: 11px; color: #8e8e93; margin-top: 4px;
  }
  .timesaved-controls {
    display: flex; align-items: center; justify-content: space-between;
    gap: 8px; padding-top: 8px; border-top: 1px solid #1e1e1e;
  }
  .timesaved-controls .typing-speed-label {
    font-size: 11px; color: #aeaeb2; font-weight: 500;
    text-transform: none; letter-spacing: 0; margin: 0;
  }
  .timesaved-controls select {
    background: #1e1e1e; color: #e0e0e0; border: 1px solid #3a3a3c;
    border-radius: 4px; padding: 3px 6px; font-size: 12px; cursor: pointer;
    outline: none;
  }
  .timesaved-basis {
    font-size: 10.5px; color: #8e8e93; margin-top: 8px; line-height: 1.4;
  }

  /* Custom Vocabulary */
  .vocab-textarea {
    width: 100%;
    min-height: 110px;
    max-height: 240px;
    background: #2c2c2e;
    border: 1px solid #3a3a3c;
    border-radius: 6px;
    padding: 8px 10px;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 12px;
    line-height: 1.4;
    resize: vertical;
    outline: none;
  }
  .vocab-textarea:focus { border-color: #0a84ff; }
  .vocab-hint {
    font-size: 10.5px; color: #8e8e93; margin-top: 6px; line-height: 1.4;
  }
  .vocab-status {
    font-size: 10.5px; color: #8e8e93; margin-top: 4px;
    opacity: 0; transition: opacity 200ms;
  }
  .vocab-status.visible { opacity: 1; }

  /* Updates */
  .update-row {
    background: #2c2c2e; border-radius: 6px; padding: 10px 12px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .update-line { display: flex; align-items: center; gap: 8px; }
  .update-version { flex: 1; font-weight: 500; }
  .update-meta { font-size: 11px; color: #8e8e93; }
  .update-status.available { color: #e0e0e0; font-weight: 500; }
  .update-status.error { color: #ff453a; }
  .update-notes {
    font-size: 11px; color: #aeaeb2; max-height: 100px; overflow-y: auto;
    background: #1e1e1e; border-radius: 4px; padding: 6px 8px; white-space: pre-wrap;
  }
</style>
</head>
<body>
<h1 data-i18n="settings.title">DM Voice</h1>

<div class="columns">
  <div class="col-left">
    <div class="field">
      <label data-i18n="settings.shortcut.label">Shortcut</label>
      <div class="shortcut-box" id="shortcut-box" data-i18n="settings.shortcut.placeholder">Click to change</div>
    </div>

    <div class="field">
      <label data-i18n="settings.sounds.label">Sounds</label>
      <div class="toggle-row">
        <span class="toggle-label" data-i18n="settings.sounds.toggle">Play sounds</span>
        <input type="checkbox" id="sounds-toggle">
      </div>
    </div>

    <div class="field">
      <label data-i18n="settings.handsfree.label">Hands-free mode</label>
      <div class="toggle-row">
        <span class="toggle-label" data-i18n="settings.handsfree.toggle">Start dictation with a wake word</span>
        <input type="checkbox" id="handsfree-toggle">
      </div>
      <div class="vocab-hint" data-i18n="settings.handsfree.hint"></div>
      <div id="handsfree-options" style="margin-top:10px; display:none">
        <div class="hf-row">
          <span class="hf-label" data-i18n="settings.handsfree.wakeword">Wake word</span>
          <select id="handsfree-wakeword" class="hf-control"></select>
        </div>
        <div class="hf-row">
          <span class="hf-label" data-i18n="settings.handsfree.sensitivity">Sensitivity</span>
          <select id="handsfree-sensitivity" class="hf-control">
            <option value="low" data-i18n="settings.handsfree.sensitivity.low">Low</option>
            <option value="medium" data-i18n="settings.handsfree.sensitivity.medium">Medium</option>
            <option value="high" data-i18n="settings.handsfree.sensitivity.high">High</option>
          </select>
        </div>
        <div class="hf-row">
          <span class="hf-label" data-i18n="settings.handsfree.silence">Stop after silence</span>
          <div class="hf-silence">
            <input type="range" id="handsfree-silence" min="1000" max="8000" step="500">
            <span id="handsfree-silence-value" class="hf-silence-value"></span>
          </div>
        </div>
      </div>
    </div>

    <div class="field">
      <label data-i18n="settings.permissions.label">Permissions</label>
      <div id="perm-list">
        <div class="perm-row" id="perm-mic">
          <div class="perm-name" data-i18n="settings.permissions.microphone">Microphone</div>
          <span class="perm-status unknown">…</span>
          <button data-i18n="settings.permissions.action.open">Open</button>
        </div>
        <div class="perm-row" id="perm-ax">
          <div class="perm-name" data-i18n="settings.permissions.accessibility">Accessibility</div>
          <span class="perm-status unknown">…</span>
          <button data-i18n="settings.permissions.action.open">Open</button>
        </div>
      </div>
    </div>

    <div class="field">
      <label data-i18n="settings.models.label">Models</label>
      <div id="model-list"></div>
    </div>
  </div>

  <div class="col-right">
    <div class="field">
      <label data-i18n="settings.timesaved.label">Time Saved</label>
      <div class="timesaved-card">
        <div class="timesaved-main">
          <div class="timesaved-minutes" id="timesaved-minutes">—</div>
          <div class="timesaved-subtitle" id="timesaved-subtitle"></div>
        </div>
        <div class="timesaved-controls">
          <span class="typing-speed-label" data-i18n="settings.timesaved.typingSpeed">Typing speed:</span>
          <select id="typing-speed-select">
            <option value="beginner" data-i18n="settings.timesaved.preset.beginner">Beginner (24 WPM)</option>
            <option value="average" data-i18n="settings.timesaved.preset.average">Average (40 WPM)</option>
            <option value="fast" data-i18n="settings.timesaved.preset.fast">Fast (60 WPM)</option>
          </select>
        </div>
        <div class="timesaved-basis" id="timesaved-basis"></div>
      </div>
    </div>

    <div class="field">
      <label data-i18n="settings.vocabulary.label">Custom Vocabulary</label>
      <textarea
        id="vocab-textarea"
        class="vocab-textarea"
        spellcheck="false"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        data-i18n-attr="placeholder:settings.vocabulary.placeholder"
        placeholder="One term per line…"></textarea>
      <div class="vocab-hint" data-i18n="settings.vocabulary.hint">
        One term per line. Names, technical terms and acronyms Whisper tends to mishear. Saves on focus loss.
      </div>
      <div class="vocab-status" id="vocab-status" data-i18n="settings.vocabulary.saved">Saved</div>
    </div>

    <div class="field">
      <label data-i18n="settings.updates.label">Updates</label>
      <div class="update-row">
        <div class="update-line">
          <div class="update-version" id="update-version">Version …</div>
          <button id="update-check-btn" data-i18n="settings.updates.check">Check for updates</button>
        </div>
        <div class="update-meta" id="update-status" data-i18n="settings.updates.notChecked">Not checked yet.</div>
        <div class="update-notes" id="update-notes" style="display:none"></div>
        <div class="update-line" id="update-install-line" style="display:none">
          <div class="update-meta" id="update-progress-text" style="flex:1" data-i18n="settings.updates.ready">Ready.</div>
          <button class="primary" id="update-install-btn" data-i18n="settings.updates.installBtn">Install &amp; restart</button>
        </div>
        <div class="progress" id="update-progress" style="display:none">
          <div class="progress-bar" id="update-progress-bar"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="../i18n/i18n.js"></script>
<script src="settings.js"></script>
</body>
</html>
