<svg xmlns="http://www.w3.org/2000/svg" width="360" height="1040" viewBox="0 0 360 1040" font-family="-apple-system, system-ui, sans-serif">
  <defs>
    <filter id="winshadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="6" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- window -->
  <rect x="10" y="10" width="340" height="1020" rx="10" ry="10"
        fill="#1c1c1e" stroke="#3a3a3c" stroke-width="0.5" filter="url(#winshadow)"/>

  <!-- title bar -->
  <rect x="10" y="10" width="340" height="36" rx="10" ry="10" fill="#2c2c2e"/>
  <rect x="10" y="36" width="340" height="10" fill="#2c2c2e"/>

  <!-- traffic lights -->
  <circle cx="28" cy="28" r="6" fill="#ff5f57"/>
  <circle cx="46" cy="28" r="6" fill="#febc2e"/>
  <circle cx="64" cy="28" r="6" fill="#28c840"/>
  <text x="180" y="32" text-anchor="middle" fill="#98989d" font-size="13" font-weight="500">DM Voice</text>

  <!-- heading -->
  <text x="28" y="84" fill="#ffffff" font-size="22" font-weight="700">DM Voice</text>

  <!-- ============================================================ -->
  <!-- SHORTCUT -->
  <!-- ============================================================ -->
  <text x="28" y="116" fill="#98989d" font-size="11" font-weight="600" letter-spacing="1">SHORTCUT</text>
  <rect x="28" y="124" width="304" height="38" rx="8" fill="#2c2c2e" stroke="#3a3a3c" stroke-width="0.5"/>
  <text x="44" y="148" fill="#ffffff" font-size="14">Alt+Space</text>

  <!-- ============================================================ -->
  <!-- SOUNDS (added v0.3.7) -->
  <!-- ============================================================ -->
  <text x="28" y="194" fill="#98989d" font-size="11" font-weight="600" letter-spacing="1">SOUNDS</text>
  <text x="28" y="222" fill="#ffffff" font-size="14" font-weight="500">Play sounds</text>
  <!-- iOS-style toggle, on -->
  <rect x="296" y="212" width="36" height="20" rx="10" fill="#0a84ff"/>
  <circle cx="324" cy="222" r="8" fill="#ffffff"/>

  <!-- ============================================================ -->
  <!-- TIME SAVED (added v0.3.8) -->
  <!-- ============================================================ -->
  <text x="28" y="262" fill="#98989d" font-size="11" font-weight="600" letter-spacing="1">TIME SAVED</text>
  <rect x="28" y="270" width="304" height="116" rx="6" fill="#2c2c2e"/>
  <!-- big green minutes number -->
  <text x="180" y="312" text-anchor="middle" fill="#30d158" font-size="28" font-weight="700">42 min</text>
  <text x="180" y="332" text-anchor="middle" fill="#aeaeb2" font-size="11">saved in May · 87 dictations</text>
  <line x1="40" y1="346" x2="320" y2="346" stroke="#1e1e1e" stroke-width="1"/>
  <!-- typing speed dropdown -->
  <text x="40" y="364" fill="#aeaeb2" font-size="11" font-weight="500">Typing speed:</text>
  <rect x="200" y="352" width="124" height="20" rx="4" fill="#1e1e1e" stroke="#3a3a3c" stroke-width="0.5"/>
  <text x="208" y="366" fill="#e0e0e0" font-size="11">Average (40 WPM)</text>
  <path d="M 312 360 L 316 364 L 320 360" fill="none" stroke="#aeaeb2" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="40" y="380" fill="#8e8e93" font-size="10">Compared to manual typing at 40 WPM.</text>

  <!-- ============================================================ -->
  <!-- PERMISSIONS -->
  <!-- ============================================================ -->
  <text x="28" y="418" fill="#98989d" font-size="11" font-weight="600" letter-spacing="1">PERMISSIONS</text>

  <!-- Microphone row -->
  <text x="28" y="446" fill="#ffffff" font-size="14" font-weight="600">Microphone</text>
  <rect x="194" y="432" width="68" height="20" rx="10" fill="#1f3d1f" stroke="#34c759" stroke-width="1"/>
  <text x="228" y="446" text-anchor="middle" fill="#34c759" font-size="11" font-weight="600">Granted</text>
  <rect x="270" y="430" width="62" height="24" rx="6" fill="#3a3a3c"/>
  <text x="301" y="446" text-anchor="middle" fill="#ffffff" font-size="12">Open</text>

  <line x1="28" y1="470" x2="332" y2="470" stroke="#3a3a3c" stroke-width="0.5"/>

  <!-- Accessibility row -->
  <text x="28" y="494" fill="#ffffff" font-size="14" font-weight="600">Accessibility</text>
  <rect x="194" y="480" width="68" height="20" rx="10" fill="#1f3d1f" stroke="#34c759" stroke-width="1"/>
  <text x="228" y="494" text-anchor="middle" fill="#34c759" font-size="11" font-weight="600">Granted</text>
  <rect x="270" y="478" width="62" height="24" rx="6" fill="#3a3a3c"/>
  <text x="301" y="494" text-anchor="middle" fill="#ffffff" font-size="12">Open</text>

  <!-- ============================================================ -->
  <!-- CUSTOM VOCABULARY (added v0.4.0) -->
  <!-- ============================================================ -->
  <text x="28" y="536" fill="#98989d" font-size="11" font-weight="600" letter-spacing="1">CUSTOM VOCABULARY</text>
  <rect x="28" y="544" width="304" height="78" rx="6" fill="#2c2c2e" stroke="#3a3a3c" stroke-width="0.5"/>
  <text x="40" y="564" fill="#ffffff" font-size="12">Whisper.cpp</text>
  <text x="40" y="580" fill="#ffffff" font-size="12">Tauri</text>
  <text x="40" y="596" fill="#ffffff" font-size="12">DM Apps GmbH</text>
  <text x="40" y="612" fill="#ffffff" font-size="12">Karl-Heinz</text>
  <text x="28" y="638" fill="#8e8e93" font-size="10.5">One term per line — names, terms &amp; acronyms Whisper mishears.</text>

  <!-- ============================================================ -->
  <!-- MODELS -->
  <!-- ============================================================ -->
  <text x="28" y="668" fill="#98989d" font-size="11" font-weight="600" letter-spacing="1">MODELS</text>

  <!-- tiny -->
  <text x="28" y="694" fill="#ffffff" font-size="14" font-weight="600">tiny</text>
  <text x="28" y="710" fill="#98989d" font-size="12">75 MB · adequate</text>
  <rect x="252" y="688" width="80" height="28" rx="6" fill="#0a84ff"/>
  <text x="292" y="706" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="600">Download</text>
  <line x1="28" y1="726" x2="332" y2="726" stroke="#3a3a3c" stroke-width="0.5"/>

  <!-- small -->
  <text x="28" y="748" fill="#ffffff" font-size="14" font-weight="600">small</text>
  <text x="28" y="764" fill="#98989d" font-size="12">244 MB · good</text>
  <rect x="252" y="742" width="80" height="28" rx="6" fill="#0a84ff"/>
  <text x="292" y="760" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="600">Download</text>
  <line x1="28" y1="780" x2="332" y2="780" stroke="#3a3a3c" stroke-width="0.5"/>

  <!-- medium -->
  <text x="28" y="802" fill="#ffffff" font-size="14" font-weight="600">medium</text>
  <text x="28" y="818" fill="#98989d" font-size="12">769 MB · very good</text>
  <rect x="252" y="796" width="80" height="28" rx="6" fill="#0a84ff"/>
  <text x="292" y="814" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="600">Download</text>
  <line x1="28" y1="834" x2="332" y2="834" stroke="#3a3a3c" stroke-width="0.5"/>

  <!-- large-v3-turbo (active) -->
  <rect x="20" y="840" width="320" height="44" rx="8" fill="#0a84ff" opacity="0.10"/>
  <text x="28" y="858" fill="#ffffff" font-size="14" font-weight="600">large-v3-turbo</text>
  <text x="28" y="874" fill="#98989d" font-size="12">874 MB · excellent</text>
  <rect x="252" y="850" width="80" height="28" rx="6" fill="#ff453a"/>
  <text x="292" y="868" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="600">Delete</text>
  <line x1="28" y1="892" x2="332" y2="892" stroke="#3a3a3c" stroke-width="0.5"/>

  <!-- large-v3 -->
  <text x="28" y="912" fill="#ffffff" font-size="14" font-weight="600">large-v3</text>
  <text x="28" y="928" fill="#98989d" font-size="12">1500 MB · excellent</text>
  <rect x="252" y="906" width="80" height="28" rx="6" fill="#0a84ff"/>
  <text x="292" y="924" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="600">Download</text>

  <!-- ============================================================ -->
  <!-- UPDATES (added v0.3.1) -->
  <!-- ============================================================ -->
  <text x="28" y="966" fill="#98989d" font-size="11" font-weight="600" letter-spacing="1">UPDATES</text>
  <rect x="28" y="974" width="304" height="46" rx="6" fill="#2c2c2e"/>
  <text x="40" y="994" fill="#ffffff" font-size="13" font-weight="500">Version 0.4.0</text>
  <rect x="220" y="982" width="104" height="24" rx="5" fill="#3a3a3c"/>
  <text x="272" y="998" text-anchor="middle" fill="#ffffff" font-size="12">Check for updates</text>
  <text x="40" y="1012" fill="#8e8e93" font-size="11">Up to date — last check: 2 hours ago</text>
</svg>
