<svg xmlns="http://www.w3.org/2000/svg" width="360" height="640" viewBox="0 0 360 640" font-family="-apple-system, system-ui, sans-serif">
  <defs>
    <filter id="winshadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="6" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- window -->
  <rect x="10" y="10" width="340" height="620" rx="10" ry="10"
        fill="#1c1c1e" stroke="#3a3a3c" stroke-width="0.5" filter="url(#winshadow)"/>

  <!-- title bar -->
  <rect x="10" y="10" width="340" height="36" rx="10" ry="10" fill="#2c2c2e"/>
  <rect x="10" y="36" width="340" height="10" fill="#2c2c2e"/>

  <!-- traffic lights -->
  <circle cx="28" cy="28" r="6" fill="#ff5f57"/>
  <circle cx="46" cy="28" r="6" fill="#febc2e"/>
  <circle cx="64" cy="28" r="6" fill="#28c840"/>
  <text x="180" y="32" text-anchor="middle" fill="#98989d" font-size="13" font-weight="500">DM Voice</text>

  <!-- heading -->
  <text x="28" y="84" fill="#ffffff" font-size="22" font-weight="700">DM Voice</text>

  <!-- SHORTCUT -->
  <text x="28" y="116" fill="#98989d" font-size="11" font-weight="600" letter-spacing="1">SHORTCUT</text>
  <rect x="28" y="124" width="304" height="38" rx="8" fill="#2c2c2e" stroke="#3a3a3c" stroke-width="0.5"/>
  <text x="44" y="148" fill="#ffffff" font-size="14">Alt+Space</text>

  <!-- PERMISSIONS -->
  <text x="28" y="194" fill="#98989d" font-size="11" font-weight="600" letter-spacing="1">PERMISSIONS</text>

  <!-- Microphone row -->
  <text x="28" y="222" fill="#ffffff" font-size="14" font-weight="600">Microphone</text>
  <rect x="194" y="208" width="68" height="20" rx="10" fill="#1f3d1f" stroke="#34c759" stroke-width="1"/>
  <text x="228" y="222" text-anchor="middle" fill="#34c759" font-size="11" font-weight="600">Granted</text>
  <rect x="270" y="206" width="62" height="24" rx="6" fill="#3a3a3c"/>
  <text x="301" y="222" text-anchor="middle" fill="#ffffff" font-size="12">Open</text>

  <line x1="28" y1="246" x2="332" y2="246" stroke="#3a3a3c" stroke-width="0.5"/>

  <!-- Accessibility row -->
  <text x="28" y="270" fill="#ffffff" font-size="14" font-weight="600">Accessibility</text>
  <rect x="194" y="256" width="68" height="20" rx="10" fill="#1f3d1f" stroke="#34c759" stroke-width="1"/>
  <text x="228" y="270" text-anchor="middle" fill="#34c759" font-size="11" font-weight="600">Granted</text>
  <rect x="270" y="254" width="62" height="24" rx="6" fill="#3a3a3c"/>
  <text x="301" y="270" text-anchor="middle" fill="#ffffff" font-size="12">Open</text>

  <!-- MODELS -->
  <text x="28" y="316" fill="#98989d" font-size="11" font-weight="600" letter-spacing="1">MODELS</text>

  <!-- tiny -->
  <text x="28" y="346" fill="#ffffff" font-size="14" font-weight="600">tiny</text>
  <text x="28" y="364" fill="#98989d" font-size="12">75 MB · adequate</text>
  <rect x="252" y="338" width="80" height="28" rx="6" fill="#0a84ff"/>
  <text x="292" y="356" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="600">Download</text>

  <line x1="28" y1="382" x2="332" y2="382" stroke="#3a3a3c" stroke-width="0.5"/>

  <!-- small -->
  <text x="28" y="406" fill="#ffffff" font-size="14" font-weight="600">small</text>
  <text x="28" y="424" fill="#98989d" font-size="12">244 MB · good</text>
  <rect x="252" y="398" width="80" height="28" rx="6" fill="#0a84ff"/>
  <text x="292" y="416" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="600">Download</text>

  <line x1="28" y1="442" x2="332" y2="442" stroke="#3a3a3c" stroke-width="0.5"/>

  <!-- medium -->
  <text x="28" y="466" fill="#ffffff" font-size="14" font-weight="600">medium</text>
  <text x="28" y="484" fill="#98989d" font-size="12">769 MB · very good</text>
  <rect x="252" y="458" width="80" height="28" rx="6" fill="#0a84ff"/>
  <text x="292" y="476" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="600">Download</text>

  <line x1="28" y1="502" x2="332" y2="502" stroke="#3a3a3c" stroke-width="0.5"/>

  <!-- large-v3-turbo (active) -->
  <rect x="20" y="510" width="320" height="48" rx="8" fill="#0a84ff" opacity="0.10"/>
  <text x="28" y="528" fill="#ffffff" font-size="14" font-weight="600">large-v3-turbo</text>
  <text x="28" y="546" fill="#98989d" font-size="12">874 MB · excellent</text>
  <rect x="252" y="520" width="80" height="28" rx="6" fill="#ff453a"/>
  <text x="292" y="538" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="600">Delete</text>

  <line x1="28" y1="574" x2="332" y2="574" stroke="#3a3a3c" stroke-width="0.5"/>

  <!-- large-v3 -->
  <text x="28" y="598" fill="#ffffff" font-size="14" font-weight="600">large-v3</text>
  <text x="28" y="616" fill="#98989d" font-size="12">1500 MB · excellent</text>
  <rect x="252" y="590" width="80" height="28" rx="6" fill="#0a84ff"/>
  <text x="292" y="608" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="600">Download</text>
</svg>
