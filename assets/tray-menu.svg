<svg xmlns="http://www.w3.org/2000/svg" width="320" height="410" viewBox="0 0 320 410" font-family="-apple-system, system-ui, sans-serif">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- pointer triangle as if menu drops down from menubar tray icon -->
  <polygon points="160,4 168,12 152,12" fill="#2c2c2e" stroke="#48484a" stroke-width="0.5"/>

  <!-- menu container -->
  <rect x="10" y="12" width="300" height="384" rx="12" ry="12"
        fill="#2c2c2e" stroke="#48484a" stroke-width="0.5" filter="url(#shadow)"/>

  <!-- App + version (disabled header) -->
  <text x="22" y="44" fill="#8e8e93" font-size="15" font-weight="500">DM Voice 0.2.1</text>
  <line x1="14" y1="62" x2="306" y2="62" stroke="#48484a" stroke-width="0.5"/>

  <!-- Model section header (disabled) -->
  <text x="22" y="92" fill="#8e8e93" font-size="15" font-weight="500">Model</text>

  <!-- model items, ~32px row height -->
  <text x="40" y="124" fill="#ffffff" font-size="15" opacity="0.4">tiny  (not downloaded)</text>
  <text x="40" y="156" fill="#ffffff" font-size="15" opacity="0.4">small  (not downloaded)</text>
  <text x="40" y="188" fill="#ffffff" font-size="15" opacity="0.4">medium  (not downloaded)</text>

  <!-- active model row with subtle highlight + checkmark -->
  <rect x="14" y="200" width="292" height="28" rx="6" fill="#ffffff" opacity="0.06"/>
  <path d="M 22 217 L 28 223 L 38 211" fill="none" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="44" y="221" fill="#ffffff" font-size="15" font-weight="500">large-v3-turbo</text>

  <text x="40" y="252" fill="#ffffff" font-size="15" opacity="0.4">large-v3  (not downloaded)</text>

  <line x1="14" y1="270" x2="306" y2="270" stroke="#48484a" stroke-width="0.5"/>

  <!-- Settings -->
  <text x="22" y="298" fill="#ffffff" font-size="15">Settings…</text>

  <!-- Launch at login — checked -->
  <path d="M 22 327 L 28 333 L 38 321" fill="none" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="44" y="332" fill="#ffffff" font-size="15">Launch at login</text>

  <line x1="14" y1="350" x2="306" y2="350" stroke="#48484a" stroke-width="0.5"/>

  <!-- Quit -->
  <text x="22" y="378" fill="#ffffff" font-size="15">Quit DM Voice</text>
</svg>
